name: Publish Verification Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/concerto-verify

jobs:
  publish-base:
    name: publish-base
    runs-on: ubuntu-latest

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: verification/docker/base/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-base:latest
            ${{ env.IMAGE_PREFIX }}-base:${{ github.sha }}
          cache-from: type=gha,scope=verify-base
          cache-to: type=gha,mode=max,scope=verify-base

  publish-targets:
    name: publish-${{ matrix.target }}
    needs: publish-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - typescript
          - jsonschema

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push target image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: verification/docker/${{ matrix.target }}/Dockerfile
          build-args: BASE_IMAGE=${{ env.IMAGE_PREFIX }}-base:latest
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha,scope=verify-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=verify-${{ matrix.target }}
