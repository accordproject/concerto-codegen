name: Publish Verification Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/concerto-verify

jobs:
  publish-base:
    name: publish-base
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: git checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: verification/docker/base/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-base:latest
            ${{ env.IMAGE_PREFIX }}-base:${{ github.sha }}
          cache-from: type=gha,scope=verify-base
          cache-to: type=gha,mode=max,scope=verify-base

  publish-targets:
    name: publish-${{ matrix.target }}
    needs: publish-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - typescript
          - jsonschema

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: git checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push target image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: verification/docker/${{ matrix.target }}/Dockerfile
          build-args: BASE_IMAGE=${{ env.IMAGE_PREFIX }}-base:latest
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha,scope=verify-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=verify-${{ matrix.target }}
