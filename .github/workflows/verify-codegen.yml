name: Verify Codegen

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/concerto-verify

jobs:
  verify:
    name: verify-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - typescript
          - jsonschema

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: verification/docker/base/Dockerfile
          tags: ${{ env.IMAGE_PREFIX }}-base:pr-${{ github.sha }}
          load: true
          cache-from: type=gha,scope=verify-base
          cache-to: type=gha,mode=max,scope=verify-base

      - name: Build target image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: verification/docker/${{ matrix.target }}/Dockerfile
          build-args: BASE_IMAGE=${{ env.IMAGE_PREFIX }}-base:pr-${{ github.sha }}
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:pr-${{ github.sha }}
          load: true
          cache-from: type=gha,scope=verify-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=verify-${{ matrix.target }}

      - name: Generate and verify in container
        run: |
          docker run --rm \
            -v "$PWD/verification/corpus:/corpus:ro" \
            -v "$PWD/verification/work-${{ matrix.target }}:/work" \
            ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:pr-${{ github.sha }}

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-${{ matrix.target }}-output
          path: verification/work-${{ matrix.target }}/
